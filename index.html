<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Coming Soon | Joseph Crawford</title>
  <meta name="description" content="Something amazing is in the works. Check back soon!">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      background: linear-gradient(135deg, #111147 0%, #1a1a6e 100%);
      font-family: Figtree, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .coming-soon-container {
      max-width: 600px;
      width: 100%;
      padding: 0 1rem;
    }
    
    .coming-soon-content {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 3rem 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    
    .coming-soon-title {
      font-size: 3rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    
    .coming-soon-description {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    
    .coming-soon-divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #00d074, #00ff88);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }
    
    .coming-soon-tagline {
      font-size: 1rem;
      font-style: italic;
      color: rgba(255, 255, 255, 0.6);
      opacity: 0.8;
    }
    
    @media (max-width: 768px) {
      .coming-soon-content {
        padding: 2rem 1.5rem;
      }
      
      .coming-soon-title {
        font-size: 2.25rem;
      }
      
      .coming-soon-description {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="coming-soon-container">
    <div class="coming-soon-content">
      <h1 class="coming-soon-title">Coming Soon</h1>
      <p class="coming-soon-description">
        Something amazing is in the works. Check back soon!
      </p>
      <div class="coming-soon-divider"></div>
      <p class="coming-soon-tagline">
        Building better experiences, one line at a time.
      </p>
    </div>
  </div>
</body>
</html>
