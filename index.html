<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joseph Crawford — Coming Soon</title>
  <meta name="description" content="Something amazing is in the works. Check back soon!">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #111147 0%, #1a1a6e 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      padding: 0 1rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 3rem 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .description {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #00d074, #00ff88);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    .tagline {
      font-size: 1rem;
      font-style: italic;
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 768px) {
      .card {
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 2.25rem;
      }

      .description {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Coming Soon</h1>
      <p class="description">Something amazing is in the works. Check back soon!</p>
      <div class="divider"></div>
      <p class="tagline">Building better experiences, one line at a time.</p>
    </div>
  </div>
</body>
</html>
